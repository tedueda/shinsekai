<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- 背景 -->
  <rect width="800" height="500" fill="#f5f5f5"/>
  
  <!-- 道路 -->
  <!-- 横の道路 -->
  <rect x="0" y="150" width="800" height="40" fill="#d0d0d0"/>
  <rect x="0" y="350" width="800" height="40" fill="#d0d0d0"/>
  
  <!-- 縦の道路 -->
  <rect x="200" y="0" width="40" height="500" fill="#d0d0d0"/>
  <rect x="400" y="0" width="40" height="500" fill="#d0d0d0"/>
  <rect x="600" y="0" width="40" height="500" fill="#d0d0d0"/>
  
  <!-- 鉄道線 -->
  <line x1="0" y1="450" x2="800" y2="450" stroke="#333" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="400" y="470" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">大阪環状線</text>
  
  <line x1="0" y1="480" x2="800" y2="480" stroke="#0066cc" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="400" y="495" font-family="Arial, sans-serif" font-size="12" fill="#0066cc" text-anchor="middle">地下鉄・動物園前駅</text>
  
  <!-- SHINSEKAI（中央・目立つ表示） -->
  <rect x="240" y="190" width="160" height="60" fill="#1a3a5c" rx="5"/>
  <text x="320" y="225" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">SHINSEKAI</text>
  <circle cx="320" cy="220" r="5" fill="#00ff00"/>
  
  <!-- 通天閣 -->
  <g>
    <polygon points="680,80 690,120 670,120" fill="#333"/>
    <rect x="675" y="120" width="10" height="30" fill="#333"/>
    <circle cx="680" cy="75" r="8" fill="#ff6600"/>
    <text x="680" y="165" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">通天閣</text>
  </g>
  
  <!-- アジアスーパー -->
  <rect x="240" y="60" width="100" height="50" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="290" y="90" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">アジアスーパー</text>
  
  <!-- デイリーカナート -->
  <rect x="440" y="190" width="100" height="50" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="490" y="210" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="middle">デイリー</text>
  <text x="490" y="225" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="middle">カナート</text>
  
  <!-- MEGAドンキホーテ -->
  <rect x="440" y="260" width="120" height="50" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="500" y="280" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="middle">MEGA</text>
  <text x="500" y="295" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="middle">ドンキホーテ</text>
  
  <!-- Daiso -->
  <rect x="610" y="260" width="80" height="40" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="650" y="285" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">Daiso</text>
  
  <!-- 星野リゾート OMO7 -->
  <rect x="50" y="260" width="120" height="50" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="110" y="280" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="middle">星野リゾート</text>
  <text x="110" y="295" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="middle">OMO7</text>
  
  <!-- 新今宮駅 -->
  <rect x="50" y="390" width="100" height="40" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="100" y="415" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">新今宮駅</text>
  
  <!-- 恵比寿町駅 -->
  <rect x="610" y="390" width="100" height="40" fill="#fff" stroke="#0066cc" stroke-width="2"/>
  <text x="660" y="415" font-family="Arial, sans-serif" font-size="12" fill="#0066cc" text-anchor="middle">恵比寿町駅</text>
  
  <!-- 天王寺動物園 -->
  <rect x="610" y="60" width="100" height="50" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="660" y="80" font-family="Arial, sans-serif" font-size="11" fill="#4caf50" text-anchor="middle">天王寺</text>
  <text x="660" y="95" font-family="Arial, sans-serif" font-size="11" fill="#4caf50" text-anchor="middle">動物園</text>
  
  <!-- 方角表示 -->
  <g>
    <text x="750" y="30" font-family="Arial, sans-serif" font-size="14" fill="#666">北</text>
    <polygon points="750,40 745,50 755,50" fill="#666"/>
  </g>
  
  <!-- 凡例 -->
  <text x="20" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a3a5c">SHINSEKAI アクセスマップ</text>
</svg>
