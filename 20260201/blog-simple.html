<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブログ - スタジオQ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: white;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #00c896;
            margin-bottom: 40px;
        }
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }
        .blog-card {
            background-color: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .blog-image {
            height: 200px;
            overflow: hidden;
        }
        .blog-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .blog-content {
            padding: 20px;
        }
        .blog-title {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: white;
        }
        .blog-excerpt {
            color: #ccc;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .blog-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }
        .blog-date {
            color: #00c896;
        }
        .blog-category {
            background-color: rgba(0, 200, 150, 0.2);
            color: #00c896;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .blog-link {
            display: inline-block;
            margin-top: 10px;
            color: #00c896;
            text-decoration: none;
            font-weight: bold;
        }
        .blog-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>スタジオQブログ</h1>
        <div class="blog-grid" id="blogGrid">
            <!-- ブログ記事がここに表示されます -->
        </div>
    </div>

    <script>
        // ブログデータを直接埋め込み
        const blogPosts = [
            {
                "title": "開放的な多目的ラウンジが支える大規模プロジェクトの撮影ミーティング｜スタジオQ（大阪）",
                "date": "2025-08-27",
                "excerpt": "大阪・スタジオQの多目的ラウンジは最大40名収容。撮影ミーティング、クライアント対応、スタッフ作業まで多用途に活用可能。動画制作会社向けに最適な環境をご紹介します。",
                "image": "images/_61A1364.JPG",
                "category": "スタジオ活用術",
                "url": "blog/lounge.html"
            },
            {
                "title": "音楽演奏を映像に残しておきませんか？気軽で楽しい撮影体験｜スタジオQ（大阪）",
                "date": "2025-08-25",
                "excerpt": "大阪のスタジオQは、演奏動画の撮影に最適。4カメのマルチアングル、完全防音で同録対応、天井高5m・22坪の広さ。ミュージックビデオ風の映像を気軽に楽しく制作し、YouTubeやSNSで発信できます。",
                "image": "images/band01.JPG",
                "category": "スタジオ活用術",
                "url": "blog/music-performance-video-osaka.html"
            },
            {
                "title": "スタジオQはYouTube動画やCM用の合成撮影に制作会社から好評です",
                "date": "2025-08-23",
                "excerpt": "大阪市内の合成撮影スタジオをお探しならスタジオQへ。特にYouTube動画やテレビCMの撮影では、安定したライティングと静粛な収録環境、そして確実なクロマキー処理が求められます。スタジオQは、その要件を満たす設備と運用で、安心の制作体制をご提供します。",
                "image": "images/operation01.jpeg",
                "category": "スタジオ活用術",
                "url": "blog/greenscreen-youtube-cm-osaka.html"
            },
            {
                "title": "天井高5メートル・広さ22坪｜大阪スタジオQで迫力の合成・コスプレ撮影を実現【完全防音・同録対応】",
                "date": "2025-08-21",
                "excerpt": "大阪・スタジオQは天井高5m・広さ22坪の大空間。グリーンバック合成、バーチャル撮影、同録、コスプレ撮影まで迫力と効率を両立する撮影環境をご紹介します。",
                "image": "images/cosplay03_3.4.1.png",
                "category": "スタジオ活用術",
                "url": "blog/large-space-studioq.html"
            },
            {
                "title": "グリーンスクリーン撮影の基本とコツ",
                "date": "2025-03-10",
                "excerpt": "プロフェッショナルなグリーンスクリーン撮影を行うための基本技術とコツをご紹介します。",
                "image": "images/IMG_5569.jpg",
                "category": "撮影技術",
                "url": "blog/greenscreen-basics.html"
            },
            {
                "title": "音楽ライブ配信のための完璧なセットアップ",
                "date": "2025-03-05",
                "excerpt": "音楽ライブ配信を成功させるための機材選びから配信設定まで、完璧なセットアップ方法を解説します。",
                "image": "images/bl03.png",
                "category": "ライブ配信",
                "url": "blog/music-live-setup.html"
            }
        ];

        // 日付フォーマット関数
        function formatDate(dateString) {
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}.${month}.${day}`;
        }

        // ブログカード生成
        function createBlogCard(post) {
            return `
                <div class="blog-card">
                    <div class="blog-image">
                        <img src="${post.image}" alt="${post.title}" loading="lazy">
                    </div>
                    <div class="blog-content">
                        <h3 class="blog-title">${post.title}</h3>
                        <p class="blog-excerpt">${post.excerpt}</p>
                        <div class="blog-meta">
                            <span class="blog-date">${formatDate(post.date)}</span>
                            <span class="blog-category">${post.category}</span>
                        </div>
                        <a href="${post.url}" class="blog-link">続きを読む →</a>
                    </div>
                </div>
            `;
        }

        // ブログ表示
        function displayBlogs() {
            const blogGrid = document.getElementById('blogGrid');
            const sortedPosts = blogPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
            const blogHTML = sortedPosts.map(post => createBlogCard(post)).join('');
            blogGrid.innerHTML = blogHTML;
        }

        // ページ読み込み時に実行
        document.addEventListener('DOMContentLoaded', displayBlogs);
    </script>
</body>
</html>
